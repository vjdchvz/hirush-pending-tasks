<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hirush Pending Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-md: rgba(0,0,0,0.14);
    --text-primary: #1a1a18;
    --text-secondary: #6b6b66;
    --text-hint: #9e9e99;
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #533fb7;
    --accent-light: #eeedfe;
    --accent-text: #3c3489;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.6;
  }

  /* Layout */
  .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
  .header-left h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); }
  .header-left p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn-primary:hover { opacity: .88; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .metric {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.1rem 1.25rem;
  }
  .metric-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--text-hint); margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 600; }
  .metric-value.total { color: var(--text-primary); }
  .metric-value.pending { color: #854f0b; }
  .metric-value.done { color: #3b6d11; }
  .metric-value.inprog { color: #185fa5; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1.6fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .chart-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
  }
  .chart-card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text-hint); margin-bottom: 1rem; }

  /* Tasks table */
  .tasks-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 0.5px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .tasks-title { font-size: 14px; font-weight: 600; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 0.5px solid var(--border-md);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
  }
  .filter-btn:hover { background: var(--bg); }
  .filter-btn.active {
    background: var(--accent-light);
    color: var(--accent-text);
    border-color: transparent;
    font-weight: 500;
  }

  .search-wrap { position: relative; }
  .search-wrap input {
    padding: 6px 10px 6px 30px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    width: 200px;
    transition: border-color .12s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 14px;
    color: var(--text-hint);
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-hint);
    text-align: left;
    padding: 10px 14px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
  }
  tbody tr { border-bottom: 0.5px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaff; }
  td { padding: 10px 14px; vertical-align: middle; }
  td.desc { font-size: 13px; color: var(--text-primary); max-width: 340px; line-height: 1.45; }
  td.module-col { font-size: 12px; color: var(--text-secondary); }
  td.role-col { font-size: 12px; color: var(--text-secondary); }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .badge-pending { background: #faeeda; color: #854f0b; }
  .badge-done { background: #eaf3de; color: #3b6d11; }
  .badge-inprog { background: #e6f1fb; color: #185fa5; }
  .badge-high { background: #fcebeb; color: #a32d2d; }
  .badge-medium { background: #faeeda; color: #854f0b; }
  .badge-low { background: #f1efe8; color: #5f5e5a; }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    color: var(--text-hint);
    line-height: 1;
    transition: all .12s;
    opacity: 0;
  }
  tbody tr:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: #fcebeb; color: #a32d2d; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-hint); font-size: 13px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity .18s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.75rem;
    width: 480px;
    max-width: calc(100vw - 2rem);
    box-shadow: 0 8px 40px rgba(0,0,0,.12);
    transform: translateY(8px);
    transition: transform .18s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    font-size: 13px;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color .12s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel {
    padding: 8px 18px;
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--text-secondary);
  }
  .btn-cancel:hover { background: var(--bg); }

  /* Confirm delete modal */
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .btn-danger {
    background: #e24b4a;
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-danger:hover { background: #c73b3a; }

  .count-badge {
    display: inline-block;
    background: var(--bg);
    border: 0.5px solid var(--border-md);
    color: var(--text-secondary);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 999px;
    margin-left: 6px;
  }

  @media (max-width: 700px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .tasks-header { flex-direction: column; align-items: flex-start; }
    .search-wrap input { width: 100%; }
    td.role-col, th:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>Hirush Pending Tasks</h1>
      <p>Internal task tracker — live view across all modules</p>
    </div>
    <button class="btn-primary" onclick="openAddModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Task
    </button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value total" id="m-total">—</div></div>
    <div class="metric"><div class="metric-label">Pending</div><div class="metric-value pending" id="m-pending">—</div></div>
    <div class="metric"><div class="metric-label">Done</div><div class="metric-value done" id="m-done">—</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-value inprog" id="m-inprog">—</div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-card-title">Tasks by module</div>
      <div style="position:relative;width:100%;height:200px;">
        <canvas id="moduleChart" role="img" aria-label="Tasks per module bar chart">Tasks grouped by module.</canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">By status</div>
      <div style="position:relative;width:100%;height:200px;">
        <canvas id="statusChart" role="img" aria-label="Tasks by status donut chart">Tasks grouped by status.</canvas>
      </div>
    </div>
  </div>

  <div class="tasks-card">
    <div class="tasks-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span class="tasks-title">All Tasks</span>
        <div class="filter-row" id="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="Pending">Pending</button>
          <button class="filter-btn" data-filter="In Progress">In progress</button>
          <button class="filter-btn" data-filter="DONE">Done</button>
        </div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search tasks…" oninput="renderTable()" />
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Task</th>
          <th>Module</th>
          <th class="role-col">Role</th>
          <th>Type</th>
          <th>Status</th>
          <th>Priority</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="task-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none;">No tasks match your filter.</div>
  </div>

</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h2 id="modal-title">Add new task</h2>
    <div class="form-group">
      <label for="f-desc">Task description *</label>
      <textarea id="f-desc" placeholder="Describe the task…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="f-module">Module *</label>
        <select id="f-module">
          <option value="">Select module…</option>
          <option>Payment Gateway</option>
          <option>Profile Creation</option>
          <option>Profile Page</option>
          <option>Account Settings</option>
          <option>Job Feed / Search</option>
          <option>Get Paid / Earnings</option>
          <option>Contracts & Tracking</option>
          <option>Scheduling System</option>
          <option>Messaging System</option>
          <option>Landing Page</option>
          <option>Legal Pages</option>
          <option>Application Page</option>
          <option>Signup Page</option>
          <option>Notification System</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f-role">User role</label>
        <select id="f-role">
          <option value="Shared (Global)">Shared (Global)</option>
          <option value="Freelancer">Freelancer</option>
          <option value="Client">Client</option>
          <option value="Client / Visitor">Client / Visitor</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="f-type">Task type</label>
        <select id="f-type">
          <option>Bug Fix</option>
          <option>Feature</option>
          <option>UI Improvement</option>
          <option>Optimization</option>
          <option>Integration</option>
          <option>Policy / Logic</option>
          <option>QA / Testing</option>
          <option>Cleanup</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f-priority">Priority</label>
        <select id="f-priority">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-primary" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="delete-modal" role="dialog" aria-modal="true" aria-labelledby="del-title">
  <div class="modal" style="max-width:380px;">
    <h2 id="del-title">Delete task?</h2>
    <p style="font-size:13px;color:var(--text-secondary);margin-top:6px;" id="del-desc"></p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
const SEED = [
  {id:1,desc:"Implement GCash Top-Up flow for buying HiRush Points.",module:"Payment Gateway",role:"Client",type:"Integration",status:"Pending",priority:"High"},
  {id:2,desc:"The error message on the client profile creation page is not aligned with the Figma design.",module:"Profile Creation",role:"Client",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:3,desc:"Unable to access the client dashboard due to a pending phone number verification step.",module:"Profile Creation",role:"Client",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:4,desc:"Develop calendar booking system allowing clients to view slots and book calls.",module:"Scheduling System",role:"Client",type:"Feature",status:"Pending",priority:"High"},
  {id:5,desc:"Move the Curation Search Bar to the top hero section.",module:"Landing Page",role:"Client / Visitor",type:"UI Improvement",status:"DONE",priority:"Medium"},
  {id:6,desc:"Center-align the bottom banner title: 'Find Your Rushstar Now'.",module:"Landing Page",role:"Client / Visitor",type:"UI Improvement",status:"DONE",priority:"Low"},
  {id:7,desc:"Fix Timezone dropdown no placeholder.",module:"Create Profile Page",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:8,desc:"Fix profile-age layout alignment.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:9,desc:"New Profile Displays Old Inputs in create profile.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:10,desc:"Reset profile picture to placeholder on new account creation if no image returns from API.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:11,desc:"Implement Certifications and Insights sections.",module:"Profile Page",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:12,desc:"Fix '3 dots' menu and 'Contact Me' actions (currently non-functional).",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:13,desc:"Implement/fix professional title display and editing.",module:"Profile Page",role:"Freelancer",type:"Feature",status:"Pending",priority:"Medium"},
  {id:14,desc:"Fix Tax Information section (saving and editing changes is broken).",module:"Account Settings",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:15,desc:"Configure Billing & Payments infrastructure.",module:"Account Settings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:16,desc:"Fix job sorting filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:17,desc:"Fix Job Type and Number of Proposals filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:18,desc:"Fix Job Category filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:19,desc:"Activate main Search Bar for jobs.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:20,desc:"Fix action buttons on cards (Share, 3-dots dropdown, and Report features).",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:21,desc:"Implement earning snapshot breakdown and Tax Information calculations.",module:"Get Paid / Earnings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:22,desc:"Fix Payment Setting configuration and 'Get Paid' release triggers.",module:"Get Paid / Earnings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:23,desc:"Fix Earning Snapshot date adjustments and calendar viewing filters.",module:"Get Paid / Earnings",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:24,desc:"Fix Active Contracts tracking and Work Diary sync features.",module:"Contracts & Tracking",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:25,desc:"Build an interactive Availability Calendar interface.",module:"Scheduling System",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:26,desc:"Enforce platform-wide minimum contract rate of $15.",module:"Contracts & Tracking",role:"Shared (Global)",type:"Optimization",status:"Pending",priority:"High"},
  {id:27,desc:"Create and publish Terms & Conditions page.",module:"Legal Pages",role:"Shared (Global)",type:"Policy / Logic",status:"DONE",priority:"Medium"},
  {id:28,desc:"Create and publish Privacy Policy page.",module:"Legal Pages",role:"Shared (Global)",type:"Policy / Logic",status:"DONE",priority:"Medium"},
  {id:29,desc:"Build Team Messaging (Group Channels) functionality.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:30,desc:"Integrate Voice Calling architecture.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:31,desc:"Integrate Video Calling architecture.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:32,desc:"Add native Emoji Support picker in chat box.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:33,desc:"Replace the current Camera Icon with a Gallery Media Pick Icon.",module:"Messaging System",role:"Shared (Global)",type:"UI Improvement",status:"Pending",priority:"Medium"},
  {id:34,desc:"Optimize image upload pipeline to fix slow transfer speeds.",module:"Messaging System",role:"Shared (Global)",type:"Optimization",status:"Pending",priority:"High"},
  {id:35,desc:"Make sent images expandable (lightbox view) when clicked.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:36,desc:"Add a local download action button when viewing images.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:37,desc:"Conduct comprehensive QA testing for MP4 file sharing compatibility.",module:"Messaging System",role:"Shared (Global)",type:"QA / Testing",status:"Pending",priority:"High"},
  {id:38,desc:"Completely remove or deprecate the legacy 'Meeting' feature block.",module:"Scheduling System",role:"Shared (Global)",type:"Cleanup",status:"Pending",priority:"Medium"},
  {id:39,desc:"Pricing Page (per Figma design).",module:"Landing Page",role:"Shared (Global)",type:"Feature",status:"DONE",priority:"Medium"},
  {id:40,desc:"Make a working Application page based on Figma design.",module:"Application Page",role:"Freelancer",type:"Feature",status:"DONE",priority:"High"},
  {id:41,desc:"Terms and Conditions / Privacy Policy not yet linked on signup page.",module:"Signup Page",role:"Shared (Global)",type:"Bug Fix",status:"In Progress",priority:"Medium"},
  {id:42,desc:"Clear All buttons not yet working on Application page.",module:"Application Page",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"Medium"},
  {id:43,desc:"Changes in Application should appear in notification bell.",module:"Notification System",role:"Freelancer",type:"Feature",status:"Pending",priority:"Medium"},
];

function loadTasks() {
  try {
    const saved = localStorage.getItem('hirush_tasks');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SEED));
  } catch { return JSON.parse(JSON.stringify(SEED)); }
}
function saveTasks() { localStorage.setItem('hirush_tasks', JSON.stringify(tasks)); }

let tasks = loadTasks();
let filterStatus = 'all';
let deleteTargetId = null;
let moduleChart, statusChart;

function nextId() { return tasks.length ? Math.max(...tasks.map(t=>t.id)) + 1 : 1; }

function statusBadge(s) {
  const map = { 'DONE':'badge-done', 'In Progress':'badge-inprog', 'Pending':'badge-pending' };
  const label = s === 'DONE' ? 'Done' : s;
  return `<span class="badge ${map[s]||'badge-pending'}">${label}</span>`;
}
function prioBadge(p) {
  const map = { 'High':'badge-high', 'Medium':'badge-medium', 'Low':'badge-low' };
  return `<span class="badge ${map[p]||'badge-medium'}">${p}</span>`;
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return tasks.filter(t => {
    const matchStatus = filterStatus === 'all' || t.status === filterStatus;
    const matchQ = !q || t.desc.toLowerCase().includes(q) || t.module.toLowerCase().includes(q) || t.type.toLowerCase().includes(q);
    return matchStatus && matchQ;
  });
}

function renderTable() {
  const tbody = document.getElementById('task-tbody');
  const empty = document.getElementById('empty-state');
  const filtered = getFiltered();

  // Update filter button counts
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const f = btn.dataset.filter;
    const count = f === 'all' ? tasks.length : tasks.filter(t=>t.status===f).length;
    btn.innerHTML = (f === 'all' ? 'All' : f === 'DONE' ? 'Done' : f) + `<span class="count-badge">${count}</span>`;
    btn.classList.toggle('active', f === filterStatus);
  });

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = filtered.map(t => `
    <tr>
      <td class="desc">${escHtml(t.desc)}</td>
      <td class="module-col">${escHtml(t.module)}</td>
      <td class="role-col">${escHtml(t.role)}</td>
      <td><span style="font-size:12px;color:var(--text-secondary);">${escHtml(t.type)}</span></td>
      <td>${statusBadge(t.status)}</td>
      <td>${prioBadge(t.priority)}</td>
      <td>
        <button class="delete-btn" onclick="openDeleteModal(${t.id})" aria-label="Delete task" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </td>
    </tr>`).join('');
}

function renderMetrics() {
  const total = tasks.length;
  const pending = tasks.filter(t=>t.status==='Pending').length;
  const done = tasks.filter(t=>t.status==='DONE').length;
  const inprog = tasks.filter(t=>t.status==='In Progress').length;
  document.getElementById('m-total').textContent = total;
  document.getElementById('m-pending').textContent = pending;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-inprog').textContent = inprog;
}

function renderCharts() {
  const modCounts = {};
  tasks.forEach(t => { modCounts[t.module] = (modCounts[t.module]||0)+1; });
  const modEntries = Object.entries(modCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const modColors = modEntries.map((_,i)=>
    ['#7F77DD','#5DCAA5','#378ADD','#D85A30','#D4537E','#639922','#EF9F27','#533FB7','#1D9E75','#888780'][i%10]
  );

  if (moduleChart) moduleChart.destroy();
  moduleChart = new Chart(document.getElementById('moduleChart'), {
    type: 'bar',
    data: {
      labels: modEntries.map(e => e[0].length > 14 ? e[0].slice(0,13)+'…' : e[0]),
      datasets: [{
        data: modEntries.map(e=>e[1]),
        backgroundColor: modColors,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font:{size:10}, maxRotation:45, color:'#9e9e99' }, grid:{display:false} },
        y: { ticks: { stepSize:1, font:{size:11}, color:'#9e9e99' }, grid:{color:'rgba(0,0,0,0.05)'} }
      }
    }
  });

  const pending = tasks.filter(t=>t.status==='Pending').length;
  const done = tasks.filter(t=>t.status==='DONE').length;
  const inprog = tasks.filter(t=>t.status==='In Progress').length;
  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById('statusChart'), {
    type: 'doughnut',
    data: {
      labels: ['Pending','Done','In progress'],
      datasets: [{
        data: [pending, done, inprog],
        backgroundColor: ['#EF9F27','#639922','#378ADD'],
        borderWidth: 3,
        borderColor: '#ffffff',
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '64%',
      plugins: {
        legend: {
          display: true,
          position: 'right',
          labels: { font:{size:12}, boxWidth:12, padding:14, color:'#6b6b66' }
        }
      }
    }
  });
}

function render() {
  renderMetrics();
  renderCharts();
  renderTable();
}

// Filters
document.getElementById('filter-row').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filterStatus = btn.dataset.filter;
  renderTable();
});

// Add modal
function openAddModal() {
  document.getElementById('f-desc').value = '';
  document.getElementById('f-module').value = '';
  document.getElementById('f-role').value = 'Shared (Global)';
  document.getElementById('f-type').value = 'Bug Fix';
  document.getElementById('f-priority').value = 'Medium';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(), 100);
}
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

function addTask() {
  const desc = document.getElementById('f-desc').value.trim();
  const module = document.getElementById('f-module').value;
  if (!desc) { document.getElementById('f-desc').focus(); return; }
  if (!module) { document.getElementById('f-module').focus(); return; }
  tasks.unshift({
    id: nextId(),
    desc,
    module,
    role: document.getElementById('f-role').value,
    type: document.getElementById('f-type').value,
    priority: document.getElementById('f-priority').value,
    status: 'Pending',
  });
  saveTasks();
  closeAddModal();
  filterStatus = 'all';
  render();
}

// Delete modal
function openDeleteModal(id) {
  deleteTargetId = id;
  const task = tasks.find(t=>t.id===id);
  document.getElementById('del-desc').textContent = task ? `"${task.desc.slice(0,80)}${task.desc.length>80?'…':''}"` : '';
  document.getElementById('delete-modal').classList.add('open');
}
function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('open');
  deleteTargetId = null;
}
function confirmDelete() {
  if (deleteTargetId === null) return;
  tasks = tasks.filter(t=>t.id!==deleteTargetId);
  saveTasks();
  closeDeleteModal();
  render();
}

// Close modals on overlay click
document.getElementById('add-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeAddModal(); });
document.getElementById('delete-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeDeleteModal(); });

// Escape key
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeAddModal(); closeDeleteModal(); }
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
