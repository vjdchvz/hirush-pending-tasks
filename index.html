<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hirush — Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d10;
  --s1:#111115;
  --s2:#16161b;
  --s3:#1c1c23;
  --s4:#22222b;
  --bd:rgba(255,255,255,0.07);
  --bd2:rgba(255,255,255,0.12);
  --t1:#e8e8ee;
  --t2:#8888a0;
  --t3:#44445a;
  --purple:#7c6df0;
  --purple-bg:rgba(124,109,240,0.12);
  --red:#f87171;
  --red-bg:rgba(248,113,113,0.1);
  --amber:#fb923c;
  --amber-bg:rgba(251,146,60,0.1);
  --green:#4ade80;
  --green-bg:rgba(74,222,128,0.1);
  --blue:#60a5fa;
  --blue-bg:rgba(96,165,250,0.1);
  --slate:#64748b;
  --slate-bg:rgba(100,116,139,0.12);
  --r:6px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;display:flex;flex-direction:column;}

/* ── TOP BAR ── */
.topbar{
  height:42px;min-height:42px;
  display:flex;align-items:center;gap:0;
  border-bottom:1px solid var(--bd);
  background:var(--s1);
  flex-shrink:0;
}
.topbar-brand{
  width:220px;min-width:220px;
  display:flex;align-items:center;gap:8px;
  padding:0 16px;
  border-right:1px solid var(--bd);
  height:100%;
  font-size:13px;font-weight:600;color:var(--t1);
}
.brand-icon{width:18px;height:18px;background:var(--purple);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-icon svg{width:10px;height:10px;stroke:#fff;stroke-width:2.5;}
.topbar-center{flex:1;display:flex;align-items:center;gap:8px;padding:0 16px;}
.topbar-search{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);
  padding:5px 10px;width:260px;
}
.topbar-search input{background:none;border:none;outline:none;font-family:inherit;font-size:12px;color:var(--t1);width:100%;}
.topbar-search input::placeholder{color:var(--t3);}
.topbar-search svg{width:13px;height:13px;stroke:var(--t3);flex-shrink:0;}
.topbar-actions{display:flex;align-items:center;gap:6px;padding:0 14px;}
.kbd{font-size:10px;background:var(--s3);border:1px solid var(--bd2);border-radius:4px;padding:2px 5px;color:var(--t3);font-family:monospace;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;min-width:220px;
  background:var(--s1);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  overflow-y:auto;
  flex-shrink:0;
}
.sidebar-section{padding:16px 8px 8px;}
.sidebar-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:0 8px 6px;}
.sidebar-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;border-radius:var(--r);cursor:pointer;
  font-size:12px;color:var(--t2);transition:all .1s;
  user-select:none;
}
.sidebar-item:hover{background:var(--s3);color:var(--t1);}
.sidebar-item.active{background:var(--s3);color:var(--t1);font-weight:500;}
.sidebar-item-left{display:flex;align-items:center;gap:7px;}
.sidebar-item-left svg{width:13px;height:13px;stroke:currentColor;flex-shrink:0;}
.s-count{font-size:10px;color:var(--t3);background:var(--s4);border-radius:3px;padding:1px 5px;min-width:18px;text-align:center;}
.sidebar-item.active .s-count{color:var(--t2);}
.sidebar-divider{height:1px;background:var(--bd);margin:4px 8px;}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

.view-header{
  height:42px;min-height:42px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid var(--bd);
  background:var(--s1);
  flex-shrink:0;
}
.view-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px;}
.view-count{font-size:11px;color:var(--t3);font-weight:400;}
.view-controls{display:flex;align-items:center;gap:6px;}

.btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:var(--r);
  border:1px solid var(--bd2);background:transparent;
  font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;
  transition:all .1s;white-space:nowrap;
}
.btn:hover{background:var(--s3);color:var(--t1);}
.btn svg{width:13px;height:13px;stroke:currentColor;}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-primary:hover{background:#6a5dd8;border-color:#6a5dd8;color:#fff;}

/* ── TASK LIST ── */
.task-list{flex:1;overflow-y:auto;}
.task-list::-webkit-scrollbar{width:4px;}
.task-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

.group-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;
  background:var(--s1);
  border-bottom:1px solid var(--bd);
  position:sticky;top:0;z-index:2;
  cursor:pointer;user-select:none;
}
.group-header-name{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;}
.group-header-count{font-size:10px;color:var(--t3);}
.group-toggle{width:14px;height:14px;stroke:var(--t3);}

.task-row{
  display:grid;
  grid-template-columns:20px 22px 1fr 140px 90px 80px 28px;
  align-items:center;gap:0;
  padding:0 18px;
  height:36px;
  border-bottom:1px solid var(--bd);
  cursor:pointer;
  transition:background .08s;
}
.task-row:hover{background:var(--s2);}
.task-row.selected{background:var(--s3);}

.task-checkbox{
  width:14px;height:14px;border-radius:3px;
  border:1px solid var(--t3);background:transparent;
  cursor:pointer;flex-shrink:0;transition:all .1s;display:flex;align-items:center;justify-content:center;
}
.task-checkbox.done{background:var(--green);border-color:var(--green);}
.task-checkbox.done svg{display:block;}
.task-checkbox svg{display:none;width:9px;height:9px;stroke:#000;stroke-width:3;}
.task-checkbox:hover:not(.done){border-color:var(--t2);}

.prio-icon{display:flex;align-items:center;justify-content:center;padding:0 4px;}
.prio-icon svg{width:12px;height:12px;flex-shrink:0;}

.task-desc{
  font-size:12px;color:var(--t1);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  padding:0 8px;
}
.task-desc.done-text{color:var(--t3);text-decoration:line-through;}

.task-module{
  font-size:11px;color:var(--t3);
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  padding:0 4px;
}
.task-type{padding:0 4px;}
.type-pill{
  font-size:10px;color:var(--t3);
  background:var(--s3);border:1px solid var(--bd);
  border-radius:3px;padding:1px 6px;
  display:inline-block;max-width:80px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.task-prio-badge{padding:0 4px;}
.p-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;}
.p-high{color:var(--red);background:var(--red-bg);}
.p-medium{color:var(--amber);background:var(--amber-bg);}
.p-low{color:var(--slate);background:var(--slate-bg);}

.task-del{
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  background:none;border:none;cursor:pointer;
  color:var(--t3);border-radius:4px;padding:3px;
  transition:all .1s;
}
.task-row:hover .task-del{opacity:1;}
.task-del:hover{background:var(--red-bg);color:var(--red);}
.task-del svg{width:13px;height:13px;stroke:currentColor;}

.empty-group{padding:14px 18px;font-size:12px;color:var(--t3);}

/* ── STATUS BAR ── */
.statusbar{
  height:26px;min-height:26px;
  display:flex;align-items:center;gap:16px;
  padding:0 18px;
  border-top:1px solid var(--bd);
  background:var(--s1);
  flex-shrink:0;
}
.sb-item{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:5px;}
.sb-dot{width:6px;height:6px;border-radius:50%;}

/* ── DETAIL PANEL ── */
.detail{
  width:0;min-width:0;
  background:var(--s1);
  border-left:1px solid var(--bd);
  overflow:hidden;
  transition:width .18s ease;
  flex-shrink:0;
  display:flex;flex-direction:column;
}
.detail.open{width:360px;min-width:360px;}
.detail-inner{width:360px;display:flex;flex-direction:column;height:100%;overflow:hidden;}
.detail-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.detail-header-title{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;}
.detail-close{background:none;border:none;cursor:pointer;color:var(--t3);padding:3px;border-radius:4px;display:flex;}
.detail-close:hover{background:var(--s3);color:var(--t1);}
.detail-close svg{width:14px;height:14px;stroke:currentColor;}
.detail-body{flex:1;overflow-y:auto;padding:16px;}
.detail-body::-webkit-scrollbar{width:4px;}
.detail-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

.detail-desc{
  font-size:13px;color:var(--t1);line-height:1.65;
  border:1px solid transparent;border-radius:var(--r);
  padding:6px 8px;margin:-6px -8px 16px;
  cursor:text;outline:none;
  transition:border-color .1s;min-height:60px;resize:none;
  background:transparent;font-family:inherit;width:100%;
}
.detail-desc:focus,.detail-desc:hover{border-color:var(--bd2);background:var(--s2);}

.detail-field{margin-bottom:12px;}
.detail-field-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);margin-bottom:5px;}
.detail-field select,.detail-field input{
  width:100%;background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--r);padding:6px 9px;font-size:12px;
  font-family:inherit;color:var(--t1);outline:none;
  transition:border-color .12s;
}
.detail-field select option{background:var(--s2);color:var(--t1);}
.detail-field select:focus,.detail-field input:focus{border-color:var(--purple);}
.detail-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.detail-id{font-size:10px;color:var(--t3);font-family:monospace;margin-bottom:16px;}
.detail-actions{padding:12px 16px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;gap:8px;}

/* ── QUICK ADD ROW ── */
.quick-add-row{
  display:grid;
  grid-template-columns:20px 22px 1fr 140px 90px 80px 28px;
  align-items:center;
  padding:0 18px;height:36px;
  border-bottom:1px solid var(--bd);
  background:var(--s2);
}
.quick-add-input{
  background:none;border:none;outline:none;
  font-family:inherit;font-size:12px;color:var(--t1);
  padding:0 8px;width:100%;
}
.quick-add-input::placeholder{color:var(--t3);}

/* ── CONFIRM DIALOG ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:300;opacity:0;pointer-events:none;transition:opacity .15s;
}
.overlay.open{opacity:1;pointer-events:all;}
.dialog{
  background:var(--s2);border:1px solid var(--bd2);
  border-radius:10px;padding:20px;width:340px;
  transform:scale(.96);transition:transform .15s;
}
.overlay.open .dialog{transform:scale(1);}
.dialog h3{font-size:14px;font-weight:600;margin-bottom:8px;}
.dialog p{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:16px;}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end;}
.btn-del{background:#7f1d1d;color:var(--red);border:none;border-radius:var(--r);padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-del:hover{background:#991b1b;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    Hirush Tasks
  </div>
  <div class="topbar-center">
    <div class="topbar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="global-search" placeholder="Search tasks…" oninput="renderAll()"/>
    </div>
  </div>
  <div class="topbar-actions">
    <span class="kbd">⌘K</span>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <div class="sidebar-item active" data-view="all" onclick="setView('all',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          All tasks
        </div>
        <span class="s-count" id="sv-all">0</span>
      </div>
      <div class="sidebar-item" data-view="Pending" onclick="setView('Pending',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Pending
        </div>
        <span class="s-count" id="sv-pending">0</span>
      </div>
      <div class="sidebar-item" data-view="In Progress" onclick="setView('In Progress',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.07-7.89"/></svg>
          In progress
        </div>
        <span class="s-count" id="sv-inprog">0</span>
      </div>
      <div class="sidebar-item" data-view="DONE" onclick="setView('DONE',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Done
        </div>
        <span class="s-count" id="sv-done">0</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Priority</div>
      <div class="sidebar-item" data-prio="High" onclick="setPrio('High',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="var(--red)" stroke="none"><path d="M12 2L2 19h20L12 2z"/></svg>
          High
        </div>
        <span class="s-count" id="sp-high">0</span>
      </div>
      <div class="sidebar-item" data-prio="Medium" onclick="setPrio('Medium',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="var(--amber)" stroke="none"><rect x="3" y="10" width="18" height="4" rx="2"/></svg>
          Medium
        </div>
        <span class="s-count" id="sp-med">0</span>
      </div>
      <div class="sidebar-item" data-prio="Low" onclick="setPrio('Low',this)">
        <div class="sidebar-item-left">
          <svg viewBox="0 0 24 24" fill="var(--slate)" stroke="none"><path d="M12 22L2 5h20L12 22z"/></svg>
          Low
        </div>
        <span class="s-count" id="sp-low">0</span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Modules</div>
      <div id="module-sidebar"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="view-header">
      <div class="view-title" id="view-title">All tasks <span class="view-count" id="view-count"></span></div>
      <div class="view-controls">
        <button class="btn btn-primary" onclick="startQuickAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New task
        </button>
      </div>
    </div>

    <div class="task-list" id="task-list"></div>

    <div class="statusbar">
      <div class="sb-item"><span class="sb-dot" style="background:var(--amber)"></span><span id="sb-pending">0 pending</span></div>
      <div class="sb-item"><span class="sb-dot" style="background:var(--blue)"></span><span id="sb-inprog">0 in progress</span></div>
      <div class="sb-item"><span class="sb-dot" style="background:var(--green)"></span><span id="sb-done">0 done</span></div>
      <div class="sb-item" style="margin-left:auto;"><span id="sb-total" style="color:var(--t3)"></span></div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail" id="detail-panel">
    <div class="detail-inner">
      <div class="detail-header">
        <span class="detail-header-title">Task detail</span>
        <button class="detail-close" onclick="closeDetail()" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="detail-body">
        <div class="detail-id" id="d-id"></div>
        <textarea class="detail-desc" id="d-desc" rows="4" oninput="patchActive('desc',this.value)" placeholder="Task description…"></textarea>
        <div class="detail-field">
          <div class="detail-field-label">Status</div>
          <select id="d-status" onchange="patchActive('status',this.value)">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="DONE">Done</option>
          </select>
        </div>
        <div class="detail-field-row">
          <div class="detail-field">
            <div class="detail-field-label">Priority</div>
            <select id="d-priority" onchange="patchActive('priority',this.value)">
              <option>High</option><option>Medium</option><option>Low</option>
            </select>
          </div>
          <div class="detail-field">
            <div class="detail-field-label">Type</div>
            <select id="d-type" onchange="patchActive('type',this.value)">
              <option>Bug Fix</option><option>Feature</option><option>UI Improvement</option>
              <option>Optimization</option><option>Integration</option><option>Policy / Logic</option>
              <option>QA / Testing</option><option>Cleanup</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">Module</div>
          <select id="d-module" onchange="patchActive('module',this.value)">
            <option>Payment Gateway</option><option>Profile Creation</option>
            <option>Profile Page</option><option>Account Settings</option>
            <option>Job Feed / Search</option><option>Get Paid / Earnings</option>
            <option>Contracts &amp; Tracking</option><option>Scheduling System</option>
            <option>Messaging System</option><option>Landing Page</option>
            <option>Legal Pages</option><option>Application Page</option>
            <option>Signup Page</option><option>Notification System</option><option>Other</option>
          </select>
        </div>
        <div class="detail-field">
          <div class="detail-field-label">User role</div>
          <select id="d-role" onchange="patchActive('role',this.value)">
            <option>Shared (Global)</option><option>Freelancer</option>
            <option>Client</option><option>Client / Visitor</option>
          </select>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn" style="color:var(--red);border-color:var(--red-bg);background:var(--red-bg);" onclick="openDel(activeId)">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Delete task
        </button>
      </div>
    </div>
  </div>

</div><!-- /layout -->

<!-- Delete confirm -->
<div class="overlay" id="del-overlay">
  <div class="dialog">
    <h3>Delete task?</h3>
    <p id="del-desc"></p>
    <div class="dialog-actions">
      <button class="btn" onclick="closeDel()">Cancel</button>
      <button class="btn-del" onclick="confirmDel()">Delete</button>
    </div>
  </div>
</div>

<script>

function load(){try{const s=localStorage.getItem('hirush_v3');return s?JSON.parse(s):JSON.parse(JSON.stringify(SEED));}catch{return JSON.parse(JSON.stringify(SEED));}}
function save(){localStorage.setItem('hirush_v3',JSON.stringify(tasks));}
let tasks=load();
let viewFilter='all';
let prioFilter=null;
let moduleFilter=null;
let activeId=null;
let delId=null;
let quickAdding=false;

function nextId(){return tasks.length?Math.max(...tasks.map(t=>t.id))+1:1;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getFiltered(){
  const q=document.getElementById('global-search').value.toLowerCase().trim();
  return tasks.filter(t=>{
    if(viewFilter!=='all'&&t.status!==viewFilter)return false;
    if(prioFilter&&t.priority!==prioFilter)return false;
    if(moduleFilter&&t.module!==moduleFilter)return false;
    if(q&&!t.desc.toLowerCase().includes(q)&&!t.module.toLowerCase().includes(q)&&!t.type.toLowerCase().includes(q))return false;
    return true;
  });
}

function prioIcon(p){
  if(p==='High') return `<svg viewBox="0 0 24 24" fill="var(--red)" stroke="none" width="12" height="12"><path d="M12 2L2 19h20L12 2z"/></svg>`;
  if(p==='Medium') return `<svg viewBox="0 0 24 24" fill="var(--amber)" stroke="none" width="12" height="12"><rect x="3" y="10" width="18" height="4" rx="2"/></svg>`;
  return `<svg viewBox="0 0 24 24" fill="var(--slate)" stroke="none" width="12" height="12"><path d="M12 22L2 5h20L12 22z"/></svg>`;
}
function pBadge(p){
  const cls={High:'p-high',Medium:'p-medium',Low:'p-low'}[p]||'p-low';
  return `<span class="p-badge ${cls}">${esc(p)}</span>`;
}

function renderAll(){
  const filtered=getFiltered();
  const pending=tasks.filter(t=>t.status==='Pending');
  const inprog=tasks.filter(t=>t.status==='In Progress');
  const done=tasks.filter(t=>t.status==='DONE');

  // sidebar counts
  document.getElementById('sv-all').textContent=tasks.length;
  document.getElementById('sv-pending').textContent=pending.length;
  document.getElementById('sv-inprog').textContent=inprog.length;
  document.getElementById('sv-done').textContent=done.length;
  document.getElementById('sp-high').textContent=tasks.filter(t=>t.priority==='High').length;
  document.getElementById('sp-med').textContent=tasks.filter(t=>t.priority==='Medium').length;
  document.getElementById('sp-low').textContent=tasks.filter(t=>t.priority==='Low').length;

  // module sidebar
  const modCounts={};
  tasks.forEach(t=>{modCounts[t.module]=(modCounts[t.module]||0)+1;});
  const mods=Object.entries(modCounts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('module-sidebar').innerHTML=mods.map(([m,c])=>`
    <div class="sidebar-item ${moduleFilter===m?'active':''}" onclick="setModule(${JSON.stringify(m)},this)">
      <div class="sidebar-item-left" style="overflow:hidden;">
        <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${esc(m)}</span>
      </div>
      <span class="s-count">${c}</span>
    </div>`).join('');

  // view title
  const titles={all:'All tasks','Pending':'Pending','In Progress':'In progress','DONE':'Done'};
  document.getElementById('view-title').innerHTML=`${titles[viewFilter]||viewFilter} <span class="view-count">${filtered.length} tasks</span>`;

  // status bar
  document.getElementById('sb-pending').textContent=`${pending.length} pending`;
  document.getElementById('sb-inprog').textContent=`${inprog.length} in progress`;
  document.getElementById('sb-done').textContent=`${done.length} done`;
  document.getElementById('sb-total').textContent=`${tasks.length} total`;

  // task list — group by status if "all" view
  const list=document.getElementById('task-list');
  let html='';

  if(viewFilter==='all'){
    const groups=[
      {label:'In progress',status:'In Progress',color:'var(--blue)'},
      {label:'Pending',status:'Pending',color:'var(--amber)'},
      {label:'Done',status:'DONE',color:'var(--green)'},
    ];
    groups.forEach(g=>{
      const rows=filtered.filter(t=>t.status===g.status);
      html+=`<div class="group-header">
        <span class="group-header-name" style="color:${g.color}">${g.label}</span>
        <span class="group-header-count">${rows.length}</span>
      </div>`;
      if(!rows.length){html+=`<div class="empty-group">No tasks</div>`;return;}
      rows.forEach(t=>{html+=taskRow(t);});
    });
  } else {
    // quick add row at top when adding
    if(quickAdding&&(viewFilter==='Pending'||viewFilter==='all')){
      html+=quickAddRow();
    }
    filtered.forEach(t=>{html+=taskRow(t);});
    if(!filtered.length) html=`<div class="empty-group" style="padding:32px 18px;color:var(--t3);">No tasks match the current filter.</div>`;
  }

  list.innerHTML=html;

  if(quickAdding){
    const inp=document.getElementById('qa-input');
    if(inp){inp.focus();}
  }
}

function taskRow(t){
  const isDone=t.status==='DONE';
  const isActive=t.id===activeId;
  return `<div class="task-row${isActive?' selected':''}" onclick="selectTask(${t.id})" data-id="${t.id}">
    <div class="task-checkbox${isDone?' done':''}" onclick="event.stopPropagation();toggleDone(${t.id})" role="checkbox" aria-checked="${isDone}" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="prio-icon">${prioIcon(t.priority)}</div>
    <div class="task-desc${isDone?' done-text':''}">${esc(t.desc)}</div>
    <div class="task-module">${esc(t.module)}</div>
    <div class="task-type"><span class="type-pill">${esc(t.type)}</span></div>
    <div class="task-prio-badge">${pBadge(t.priority)}</div>
    <button class="task-del" onclick="event.stopPropagation();openDel(${t.id})" aria-label="Delete">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
    </button>
  </div>`;
}

function quickAddRow(){
  return `<div class="quick-add-row">
    <div></div><div></div>
    <input class="quick-add-input" id="qa-input" placeholder="Task description — press Enter to add, Esc to cancel"
      onkeydown="handleQA(event)" />
    <div></div><div></div><div></div><div></div>
  </div>`;
}

function startQuickAdd(){
  quickAdding=true;
  if(viewFilter!=='Pending') setView('Pending', document.querySelector('[data-view="Pending"]'));
  else renderAll();
}
function handleQA(e){
  if(e.key==='Enter'){
    const v=e.target.value.trim();
    if(!v) return;
    tasks.unshift({id:nextId(),desc:v,module:'Other',role:'Shared (Global)',type:'Bug Fix',status:'Pending',priority:'Medium'});
    save();
    quickAdding=false;
    renderAll();
    // auto-open the new task
    selectTask(tasks[0].id);
  }
  if(e.key==='Escape'){quickAdding=false;renderAll();}
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  t.status=t.status==='DONE'?'Pending':'DONE';
  save();
  if(activeId===id){populateDetail(t);}
  renderAll();
}

function selectTask(id){
  activeId=id;
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  populateDetail(t);
  document.getElementById('detail-panel').classList.add('open');
  renderAll();
}
function closeDetail(){
  activeId=null;
  document.getElementById('detail-panel').classList.remove('open');
  renderAll();
}
function populateDetail(t){
  document.getElementById('d-id').textContent=`TASK-${String(t.id).padStart(3,'0')} · ${t.role}`;
  document.getElementById('d-desc').value=t.desc;
  ['status','priority','type','module','role'].forEach(k=>{
    const el=document.getElementById('d-'+k);
    if(el) el.value=t[k];
  });
}
function patchActive(field,value){
  if(activeId===null)return;
  const t=tasks.find(x=>x.id===activeId);
  if(!t)return;
  t[field]=value;
  save();
  renderAll();
}

function setView(v,el){
  viewFilter=v; prioFilter=null; moduleFilter=null; quickAdding=false;
  document.querySelectorAll('.sidebar-item[data-view]').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  document.querySelectorAll('.sidebar-item[data-prio]').forEach(x=>x.classList.remove('active'));
  renderAll();
}
function setPrio(p,el){
  prioFilter=prioFilter===p?null:p;
  document.querySelectorAll('.sidebar-item[data-prio]').forEach(x=>x.classList.toggle('active',x===el&&prioFilter===p));
  document.querySelectorAll('.sidebar-item[data-view]').forEach(x=>x.classList.remove('active'));
  moduleFilter=null; viewFilter='all';
  renderAll();
}
function setModule(m,el){
  moduleFilter=moduleFilter===m?null:m;
  prioFilter=null; viewFilter='all';
  document.querySelectorAll('.sidebar-item[data-view]').forEach(x=>x.classList.remove('active'));
  renderAll();
}

// Delete
function openDel(id){
  delId=id;
  const t=tasks.find(x=>x.id===id);
  document.getElementById('del-desc').textContent=t?`"${t.desc.slice(0,80)}${t.desc.length>80?'…':''}"`:'';
  document.getElementById('del-overlay').classList.add('open');
}
function closeDel(){document.getElementById('del-overlay').classList.remove('open');delId=null;}
function confirmDel(){
  if(delId===null)return;
  if(activeId===delId)closeDetail();
  tasks=tasks.filter(t=>t.id!==delId);
  save();closeDel();renderAll();
}
document.getElementById('del-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDel();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeDel();if(!quickAdding)closeDetail();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('global-search').focus();}
});

renderAll();
</script>
</body>
</html>
