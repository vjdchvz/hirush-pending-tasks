<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hirush — Pending Tasks</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0b0b0f;
  --bg2:       #101015;
  --surface:   #16161e;
  --card:      #1c1c26;
  --card-h:    #21212d;
  --border:    rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.12);
  --t1: #eeeef2;
  --t2: #8888a8;
  --t3: #55556a;
  --purple:    #7c6df0;
  --purple-dim:#3d3578;
  --purple-glow: rgba(124,109,240,0.18);
  --red:   #f87171;
  --red-dim:   rgba(248,113,113,0.12);
  --amber: #fb923c;
  --amber-dim: rgba(251,146,60,0.12);
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --blue:  #60a5fa;
  --blue-dim:  rgba(96,165,250,0.12);
  --slate: #94a3b8;
  --slate-dim: rgba(148,163,184,0.1);
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--t1);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* Subtle grid texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; padding: 0 1.5rem 5rem; }

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 2rem;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 3rem;
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-brand-dot {
  width: 28px; height: 28px;
  background: var(--purple);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.nav-brand-dot svg { width: 15px; height: 15px; stroke: #fff; }
.nav-brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.01em; color: var(--t1); }
.nav-brand-name span { color: var(--t3); font-weight: 400; }
.nav-pills { display: flex; gap: 6px; }
.nav-pill {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 999px;
  border: 0.5px solid var(--border-md);
  background: transparent;
  color: var(--t2);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.nav-pill:hover, .nav-pill.active { background: var(--purple); color: #fff; border-color: var(--purple); }
.btn-add {
  display: flex; align-items: center; gap: 7px;
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  letter-spacing: -.01em;
}
.btn-add:hover { background: #6a5dd8; }
.btn-add svg { width: 14px; height: 14px; stroke: #fff; }

/* ── HERO ── */
.hero {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 2rem;
  margin-bottom: 3rem;
  padding: 2.5rem 2.5rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, var(--purple-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--purple);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.hero-label::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--purple);
  box-shadow: 0 0 8px var(--purple);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 8px var(--purple); }
  50%      { opacity: .5; box-shadow: 0 0 3px var(--purple); }
}
.hero-title { font-size: 32px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; line-height: 1.2; margin-bottom: 10px; }
.hero-title span { color: var(--purple); }
.hero-sub { font-size: 13px; color: var(--t2); max-width: 440px; line-height: 1.65; }
.hero-stats { display: flex; gap: 2rem; }
.hero-stat { text-align: center; }
.hero-stat-num { font-size: 28px; font-weight: 700; letter-spacing: -.02em; }
.hero-stat-num.amber { color: var(--amber); }
.hero-stat-num.green { color: var(--green); }
.hero-stat-num.blue  { color: var(--blue); }
.hero-stat-label { font-size: 11px; color: var(--t3); margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }

/* ── SECTION HEADING ── */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}
.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--t2);
}
.section-count {
  background: var(--purple-dim);
  color: var(--purple);
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
}
.section-controls { display: flex; gap: 8px; align-items: center; }
.filter-chip {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 0.5px solid var(--border-md);
  background: transparent;
  color: var(--t3);
  cursor: pointer;
  font-family: inherit;
  transition: all .12s;
}
.filter-chip:hover { color: var(--t2); border-color: var(--border-md); }
.filter-chip.on { background: var(--card); color: var(--t1); border-color: var(--border-md); }

/* ── SEARCH ── */
.search-wrap { position: relative; }
.search-wrap input {
  background: var(--surface);
  border: 0.5px solid var(--border-md);
  border-radius: var(--r-sm);
  padding: 7px 10px 7px 32px;
  font-size: 12px;
  font-family: inherit;
  color: var(--t1);
  outline: none;
  width: 200px;
  transition: border-color .15s;
}
.search-wrap input::placeholder { color: var(--t3); }
.search-wrap input:focus { border-color: var(--purple); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; stroke: var(--t3); pointer-events: none;
}

/* ── PENDING TASK CARDS GRID ── */
.pending-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
  margin-bottom: 3rem;
}
.task-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.1rem 1.25rem;
  transition: all .18s;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.task-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 4px 0 0 4px;
  background: var(--t3);
  transition: background .18s;
}
.task-card.high::before  { background: var(--red); }
.task-card.medium::before { background: var(--amber); }
.task-card.low::before   { background: var(--slate); }
.task-card:hover { background: var(--card-h); border-color: var(--border-md); transform: translateY(-1px); }
.task-card:hover.high { box-shadow: 0 4px 24px rgba(248,113,113,0.08); }
.task-card:hover.medium { box-shadow: 0 4px 24px rgba(251,146,60,0.08); }

.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.card-module {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--t3);
  background: var(--bg2);
  padding: 3px 8px;
  border-radius: 4px;
  border: 0.5px solid var(--border);
}
.card-header-right { display: flex; align-items: center; gap: 6px; }
.prio-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.prio-high   { background: var(--red-dim);   color: var(--red); }
.prio-medium { background: var(--amber-dim); color: var(--amber); }
.prio-low    { background: var(--slate-dim); color: var(--slate); }
.delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  border-radius: 6px;
  color: var(--t3);
  line-height: 0;
  transition: all .12s;
  opacity: 0;
}
.task-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: var(--red-dim); color: var(--red); }
.delete-btn svg { width: 13px; height: 13px; stroke: currentColor; }

.card-desc {
  font-size: 13px;
  color: var(--t1);
  line-height: 1.55;
  margin-bottom: 12px;
  font-weight: 400;
}
.card-footer { display: flex; align-items: center; gap: 8px; }
.card-type {
  font-size: 10px;
  color: var(--t3);
  background: var(--bg2);
  padding: 2px 7px;
  border-radius: 4px;
  border: 0.5px solid var(--border);
}
.card-role {
  font-size: 10px;
  color: var(--t3);
}

/* ── SECONDARY SECTIONS ── */
.secondary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 3rem;
}
.list-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.list-card-head {
  padding: .9rem 1.25rem;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.list-card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--t3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.dot-green { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; }
.dot-blue  { width: 6px; height: 6px; border-radius: 50%; background: var(--blue);  display: inline-block; }
.list-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 10px 1.25rem;
  border-bottom: 0.5px solid var(--border);
  transition: background .12s;
}
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--card); }
.list-row-desc { font-size: 12px; color: var(--t2); line-height: 1.45; }
.list-row-mod  { font-size: 10px; color: var(--t3); white-space: nowrap; margin-top: 2px; }

/* ── BOTTOM STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 3rem;
}
.stat-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 1rem;
}
.stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--t3); margin-bottom: 8px; }
.stat-num   { font-size: 20px; font-weight: 700; color: var(--t1); letter-spacing: -.02em; }
.stat-bar { margin-top: 8px; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 999px; background: var(--purple); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 0.5px solid var(--border-md);
  border-radius: var(--r-lg);
  padding: 2rem;
  width: 500px;
  max-width: calc(100vw - 2rem);
  transform: translateY(12px) scale(.98);
  transition: transform .2s;
}
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal-title { font-size: 16px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 1.5rem; color: var(--t1); }
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--t3); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  background: var(--card);
  border: 0.5px solid var(--border-md);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  font-size: 13px;
  font-family: inherit;
  color: var(--t1);
  outline: none;
  transition: border-color .15s;
}
.form-group input::placeholder, .form-group textarea::placeholder { color: var(--t3); }
.form-group select option { background: var(--card); color: var(--t1); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--purple); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.75rem; }
.btn-ghost {
  padding: 8px 18px;
  border: 0.5px solid var(--border-md);
  border-radius: var(--r-sm);
  background: transparent;
  font-size: 13px; font-family: inherit;
  color: var(--t2);
  cursor: pointer;
  transition: all .12s;
}
.btn-ghost:hover { background: var(--card); color: var(--t1); }
.btn-danger {
  background: #7f1d1d;
  color: var(--red);
  border: none;
  border-radius: var(--r-sm);
  padding: 8px 18px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: background .12s;
}
.btn-danger:hover { background: #991b1b; }

.empty { text-align: center; padding: 4rem 1rem; color: var(--t3); font-size: 13px; }
.empty svg { width: 40px; height: 40px; stroke: var(--t3); margin-bottom: 1rem; opacity: .4; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 999px; }

@media (max-width: 700px) {
  .hero { grid-template-columns: 1fr; }
  .hero-stats { gap: 1rem; }
  .secondary-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  nav .nav-pills { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav>
    <div class="nav-brand">
      <div class="nav-brand-dot">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span class="nav-brand-name">Hirush <span>/ Task Tracker</span></span>
    </div>
    <div class="nav-pills">
      <button class="nav-pill active" onclick="scrollTo({top:0,behavior:'smooth'})">Overview</button>
      <button class="nav-pill" onclick="document.getElementById('pending-section').scrollIntoView({behavior:'smooth'})">Pending</button>
      <button class="nav-pill" onclick="document.getElementById('done-section').scrollIntoView({behavior:'smooth'})">Done</button>
    </div>
    <button class="btn-add" onclick="openAddModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Task
    </button>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div>
      <div class="hero-label">Live board</div>
      <div class="hero-title">
        <span id="hero-pending-num">31</span> tasks<br>still pending
      </div>
      <div class="hero-sub">Track, prioritize, and clear every open item across Hirush modules. High-priority items are highlighted — tackle those first.</div>
    </div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-num amber" id="hs-high">0</div>
        <div class="hero-stat-label">High prio</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num blue" id="hs-inprog">0</div>
        <div class="hero-stat-label">In progress</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num green" id="hs-done">0</div>
        <div class="hero-stat-label">Done</div>
      </div>
    </div>
  </div>

  <!-- MODULE STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- PENDING TASKS -->
  <div id="pending-section">
    <div class="section-head">
      <div class="section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Pending Tasks
        <span class="section-count" id="pending-count">0</span>
      </div>
      <div class="section-controls">
        <div id="prio-filters" style="display:flex;gap:6px;">
          <button class="filter-chip on" data-prio="all">All priorities</button>
          <button class="filter-chip" data-prio="High">High</button>
          <button class="filter-chip" data-prio="Medium">Medium</button>
          <button class="filter-chip" data-prio="Low">Low</button>
        </div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search…" oninput="renderPending()" />
        </div>
      </div>
    </div>
    <div class="pending-grid" id="pending-grid"></div>
  </div>

  <!-- DONE + IN PROGRESS -->
  <div class="secondary-grid" id="done-section">
    <div class="list-card">
      <div class="list-card-head">
        <div class="list-card-title"><span class="dot-blue"></span>In Progress</div>
        <span class="section-count" id="inprog-count" style="background:rgba(96,165,250,.15);color:var(--blue);">0</span>
      </div>
      <div id="inprog-list"></div>
    </div>
    <div class="list-card">
      <div class="list-card-head">
        <div class="list-card-title"><span class="dot-green"></span>Completed</div>
        <span class="section-count" id="done-count" style="background:var(--green-dim);color:var(--green);">0</span>
      </div>
      <div id="done-list"></div>
    </div>
  </div>

</div>

<!-- Add Modal -->
<div class="overlay" id="add-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-h">
  <div class="modal">
    <div class="modal-title" id="modal-h">New pending task</div>
    <div class="form-group">
      <label class="form-label" for="f-desc">Description *</label>
      <textarea id="f-desc" placeholder="What needs to be done?"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="f-module">Module *</label>
        <select id="f-module">
          <option value="">Select…</option>
          <option>Payment Gateway</option><option>Profile Creation</option>
          <option>Profile Page</option><option>Account Settings</option>
          <option>Job Feed / Search</option><option>Get Paid / Earnings</option>
          <option>Contracts &amp; Tracking</option><option>Scheduling System</option>
          <option>Messaging System</option><option>Landing Page</option>
          <option>Legal Pages</option><option>Application Page</option>
          <option>Signup Page</option><option>Notification System</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-role">User role</label>
        <select id="f-role">
          <option>Shared (Global)</option><option>Freelancer</option>
          <option>Client</option><option>Client / Visitor</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="f-type">Type</label>
        <select id="f-type">
          <option>Bug Fix</option><option>Feature</option>
          <option>UI Improvement</option><option>Optimization</option>
          <option>Integration</option><option>Policy / Logic</option>
          <option>QA / Testing</option><option>Cleanup</option><option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-priority">Priority</label>
        <select id="f-priority">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeAdd()">Cancel</button>
      <button class="btn-add" onclick="addTask()">Add task</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="overlay" id="del-overlay" role="dialog" aria-modal="true" aria-labelledby="del-h">
  <div class="modal" style="max-width:400px;">
    <div class="modal-title" id="del-h">Delete this task?</div>
    <p style="font-size:13px;color:var(--t2);line-height:1.6;" id="del-desc"></p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeDel()">Cancel</button>
      <button class="btn-danger" onclick="confirmDel()">Delete task</button>
    </div>
  </div>
</div>

<script>
const SEED = [
  {id:1,desc:"Implement GCash Top-Up flow for buying HiRush Points.",module:"Payment Gateway",role:"Client",type:"Integration",status:"Pending",priority:"High"},
  {id:2,desc:"The error message on the client profile creation page is not aligned with the Figma design.",module:"Profile Creation",role:"Client",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:3,desc:"Unable to access the client dashboard due to a pending phone number verification step.",module:"Profile Creation",role:"Client",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:4,desc:"Develop calendar booking system allowing clients to view slots and book calls.",module:"Scheduling System",role:"Client",type:"Feature",status:"Pending",priority:"High"},
  {id:5,desc:"Move the Curation Search Bar to the top hero section.",module:"Landing Page",role:"Client / Visitor",type:"UI Improvement",status:"DONE",priority:"Medium"},
  {id:6,desc:"Center-align the bottom banner title: 'Find Your Rushstar Now'.",module:"Landing Page",role:"Client / Visitor",type:"UI Improvement",status:"DONE",priority:"Low"},
  {id:7,desc:"Fix Timezone dropdown no placeholder.",module:"Create Profile Page",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:8,desc:"Fix profile-age layout alignment.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:9,desc:"New Profile Displays Old Inputs in create profile.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:10,desc:"Reset profile picture to placeholder on new account creation if no image returns from API.",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:11,desc:"Implement Certifications and Insights sections.",module:"Profile Page",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:12,desc:"Fix '3 dots' menu and 'Contact Me' actions (currently non-functional).",module:"Profile Page",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:13,desc:"Implement/fix professional title display and editing.",module:"Profile Page",role:"Freelancer",type:"Feature",status:"Pending",priority:"Medium"},
  {id:14,desc:"Fix Tax Information section (saving and editing changes is broken).",module:"Account Settings",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:15,desc:"Configure Billing & Payments infrastructure.",module:"Account Settings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:16,desc:"Fix job sorting filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:17,desc:"Fix Job Type and Number of Proposals filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:18,desc:"Fix Job Category filters.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"High"},
  {id:19,desc:"Activate main Search Bar for jobs.",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:20,desc:"Fix action buttons on cards (Share, 3-dots dropdown, and Report features).",module:"Job Feed / Search",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:21,desc:"Implement earning snapshot breakdown and Tax Information calculations.",module:"Get Paid / Earnings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:22,desc:"Fix Payment Setting configuration and 'Get Paid' release triggers.",module:"Get Paid / Earnings",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:23,desc:"Fix Earning Snapshot date adjustments and calendar viewing filters.",module:"Get Paid / Earnings",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"Medium"},
  {id:24,desc:"Fix Active Contracts tracking and Work Diary sync features.",module:"Contracts & Tracking",role:"Freelancer",type:"Bug Fix",status:"Pending",priority:"High"},
  {id:25,desc:"Build an interactive Availability Calendar interface.",module:"Scheduling System",role:"Freelancer",type:"Feature",status:"Pending",priority:"High"},
  {id:26,desc:"Enforce platform-wide minimum contract rate of $15.",module:"Contracts & Tracking",role:"Shared (Global)",type:"Optimization",status:"Pending",priority:"High"},
  {id:27,desc:"Create and publish Terms & Conditions page.",module:"Legal Pages",role:"Shared (Global)",type:"Policy / Logic",status:"DONE",priority:"Medium"},
  {id:28,desc:"Create and publish Privacy Policy page.",module:"Legal Pages",role:"Shared (Global)",type:"Policy / Logic",status:"DONE",priority:"Medium"},
  {id:29,desc:"Build Team Messaging (Group Channels) functionality.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:30,desc:"Integrate Voice Calling architecture.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:31,desc:"Integrate Video Calling architecture.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"High"},
  {id:32,desc:"Add native Emoji Support picker in chat box.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:33,desc:"Replace the current Camera Icon with a Gallery Media Pick Icon.",module:"Messaging System",role:"Shared (Global)",type:"UI Improvement",status:"Pending",priority:"Medium"},
  {id:34,desc:"Optimize image upload pipeline to fix slow transfer speeds.",module:"Messaging System",role:"Shared (Global)",type:"Optimization",status:"Pending",priority:"High"},
  {id:35,desc:"Make sent images expandable (lightbox view) when clicked.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:36,desc:"Add a local download action button when viewing images.",module:"Messaging System",role:"Shared (Global)",type:"Feature",status:"Pending",priority:"Medium"},
  {id:37,desc:"Conduct comprehensive QA testing for MP4 file sharing compatibility.",module:"Messaging System",role:"Shared (Global)",type:"QA / Testing",status:"Pending",priority:"High"},
  {id:38,desc:"Completely remove or deprecate the legacy 'Meeting' feature block.",module:"Scheduling System",role:"Shared (Global)",type:"Cleanup",status:"Pending",priority:"Medium"},
  {id:39,desc:"Pricing Page (per Figma design).",module:"Landing Page",role:"Shared (Global)",type:"Feature",status:"DONE",priority:"Medium"},
  {id:40,desc:"Make a working Application page based on Figma design.",module:"Application Page",role:"Freelancer",type:"Feature",status:"DONE",priority:"High"},
  {id:41,desc:"Terms and Conditions / Privacy Policy not yet linked on signup page.",module:"Signup Page",role:"Shared (Global)",type:"Bug Fix",status:"In Progress",priority:"Medium"},
  {id:42,desc:"Clear All buttons not yet working on Application page.",module:"Application Page",role:"Freelancer",type:"Bug Fix",status:"DONE",priority:"Medium"},
  {id:43,desc:"Changes in Application should appear in notification bell.",module:"Notification System",role:"Freelancer",type:"Feature",status:"Pending",priority:"Medium"},
];

function load() {
  try { const s = localStorage.getItem('hirush_v2'); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED)); }
  catch { return JSON.parse(JSON.stringify(SEED)); }
}
function save() { localStorage.setItem('hirush_v2', JSON.stringify(tasks)); }

let tasks = load();
let prioFilter = 'all';
let delId = null;

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nextId() { return tasks.length ? Math.max(...tasks.map(t=>t.id))+1 : 1; }

function renderAll() {
  const pending  = tasks.filter(t=>t.status==='Pending');
  const done     = tasks.filter(t=>t.status==='DONE');
  const inprog   = tasks.filter(t=>t.status==='In Progress');
  const highPend = pending.filter(t=>t.priority==='High');

  // hero
  document.getElementById('hero-pending-num').textContent = pending.length;
  document.getElementById('hs-high').textContent   = highPend.length;
  document.getElementById('hs-inprog').textContent = inprog.length;
  document.getElementById('hs-done').textContent   = done.length;

  renderStats(pending);
  renderPending();
  renderList('inprog-list', inprog, 'inprog-count');
  renderList('done-list', done, 'done-count');
}

function renderStats(pending) {
  const modCounts = {};
  tasks.forEach(t=>{ modCounts[t.module]=(modCounts[t.module]||0)+1; });
  const top = Object.entries(modCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const max = top[0]?.[1] || 1;
  const el = document.getElementById('stats-row');
  el.innerHTML = top.map(([mod, count]) => {
    const pendCount = pending.filter(t=>t.module===mod).length;
    return `<div class="stat-card">
      <div class="stat-label">${esc(mod.replace(' / ',' /\n').replace(' System','').replace(' & ','/ '))}</div>
      <div class="stat-num">${count}</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <div style="font-size:10px;color:var(--t3);margin-top:5px;">${pendCount} pending</div>
    </div>`;
  }).join('');
}

function renderPending() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const pending = tasks.filter(t => {
    if (t.status !== 'Pending') return false;
    if (prioFilter !== 'all' && t.priority !== prioFilter) return false;
    if (q && !t.desc.toLowerCase().includes(q) && !t.module.toLowerCase().includes(q) && !t.type.toLowerCase().includes(q)) return false;
    return true;
  });
  // sort: High first
  pending.sort((a,b)=>{ const o={High:0,Medium:1,Low:2}; return (o[a.priority]??1)-(o[b.priority]??1); });

  document.getElementById('pending-count').textContent = pending.length;
  const grid = document.getElementById('pending-grid');
  if (!pending.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div>No tasks match your filter.</div>
    </div>`;
    return;
  }
  grid.innerHTML = pending.map(t => `
    <div class="task-card ${t.priority.toLowerCase()}">
      <div class="card-header">
        <span class="card-module">${esc(t.module)}</span>
        <div class="card-header-right">
          <span class="prio-badge prio-${t.priority.toLowerCase()}">${esc(t.priority)}</span>
          <button class="delete-btn" onclick="openDel(${t.id})" aria-label="Delete task">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
      </div>
      <div class="card-desc">${esc(t.desc)}</div>
      <div class="card-footer">
        <span class="card-type">${esc(t.type)}</span>
        <span class="card-role">${esc(t.role)}</span>
      </div>
    </div>`).join('');
}

function renderList(elId, list, countId) {
  const count = document.getElementById(countId);
  if (count) count.textContent = list.length;
  const el = document.getElementById(elId);
  if (!list.length) { el.innerHTML = `<div class="empty">Nothing here.</div>`; return; }
  el.innerHTML = list.map(t=>`
    <div class="list-row">
      <div>
        <div class="list-row-desc">${esc(t.desc)}</div>
        <div class="list-row-mod">${esc(t.module)} &middot; ${esc(t.type)}</div>
      </div>
      <span class="prio-badge prio-${t.priority.toLowerCase()}" style="font-size:9px;white-space:nowrap;">${esc(t.priority)}</span>
    </div>`).join('');
}

// Priority filter
document.getElementById('prio-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-chip');
  if (!btn) return;
  prioFilter = btn.dataset.prio;
  document.querySelectorAll('#prio-filters .filter-chip').forEach(b=>b.classList.toggle('on', b===btn));
  renderPending();
});

// Add
function openAddModal() {
  ['f-desc','f-module'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-role').value='Shared (Global)';
  document.getElementById('f-type').value='Bug Fix';
  document.getElementById('f-priority').value='Medium';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(),100);
}
function closeAdd() { document.getElementById('add-overlay').classList.remove('open'); }
function addTask() {
  const desc = document.getElementById('f-desc').value.trim();
  const module = document.getElementById('f-module').value;
  if (!desc) { document.getElementById('f-desc').focus(); return; }
  if (!module) { document.getElementById('f-module').focus(); return; }
  tasks.unshift({ id:nextId(), desc, module,
    role: document.getElementById('f-role').value,
    type: document.getElementById('f-type').value,
    priority: document.getElementById('f-priority').value,
    status: 'Pending' });
  save(); closeAdd(); renderAll();
}

// Delete
function openDel(id) {
  delId = id;
  const t = tasks.find(x=>x.id===id);
  document.getElementById('del-desc').textContent = t ? `"${t.desc.slice(0,90)}${t.desc.length>90?'…':''}"` : '';
  document.getElementById('del-overlay').classList.add('open');
}
function closeDel() { document.getElementById('del-overlay').classList.remove('open'); delId=null; }
function confirmDel() { if(delId===null) return; tasks=tasks.filter(t=>t.id!==delId); save(); closeDel(); renderAll(); }

// Close on backdrop
['add-overlay','del-overlay'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{ if(e.target===e.currentTarget) e.target.classList.remove('open'); });
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeAdd(); closeDel(); } });

renderAll();
</script>
</body>
</html>
